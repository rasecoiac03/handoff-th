services:
  postgres:
    image: postgres:17-alpine
    container_name: renovation-tracker-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: tracker
      POSTGRES_PASSWORD: tracker
      POSTGRES_DB: renovation_tracker
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
